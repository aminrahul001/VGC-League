<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon VGC Draft League</title>
<meta name="description" content="Home base for the Pokemon VGC Draft League — matches played in Pokémon Champions.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D0D0D;
    --ink-soft:#161616;
    --panel:#1C1C1C;
    --cream:#FAFAF7;
    --cream-dim:#B8B7B2;
    --gold:#FFCB05;
    --gold-soft:#C79A00;
    --teal:#B00000;
    --teal-bright:#FF5A5A;
    --scarlet:#EE1515;
    --slate:#3A3A3A;
    --line: rgba(250,250,247,0.14);

    --display: 'Big Shoulders Display', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'Space Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--cream);
    font-family:var(--body);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--gold);color:var(--ink);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  header.site-nav{
    position:fixed;top:0;left:0;right:0;z-index:60;
    background:rgba(13,13,13,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;max-width:1300px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:18px;letter-spacing:0.02em;text-transform:uppercase;}
  .brand-mark{width:22px;height:22px;flex-shrink:0;}
  .nav-links{display:flex;gap:20px;font-size:13px;font-weight:600;color:var(--cream-dim);}
  .nav-links a:hover{color:var(--gold);}
  @media (max-width:760px){
    .nav-links{display:none;}
  }

  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .collage{
    position:absolute;
    inset:0;
    z-index:0;
  }
  .collage img{
    position:absolute;
    object-fit:contain;
    filter:grayscale(0.25) brightness(0.9) contrast(1.05);
    opacity:0.85;
    pointer-events:none;
    user-select:none;
  }

  .hero-scrim{
    position:absolute;inset:0;z-index:1;
    background:
      radial-gradient(ellipse 720px 440px at 50% 46%, rgba(13,13,13,0.85) 0%, rgba(13,13,13,0.35) 55%, transparent 82%),
      linear-gradient(180deg, rgba(13,13,13,0.28) 0%, rgba(13,13,13,0.42) 100%);
  }

  .hero-content{
    position:relative;z-index:2;
    text-align:center;
    padding:0 24px;
  }
  .hero-content .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold);
    display:block;
    margin-bottom:18px;
  }
  .hero-content h1{
    font-family:var(--display);
    font-weight:900;
    text-transform:uppercase;
    line-height:0.92;
    letter-spacing:0.01em;
    font-size:clamp(46px, 9vw, 112px);
    margin:0;
    text-shadow:0 4px 30px rgba(0,0,0,0.6);
  }
  .hero-content h1 .accent{color:var(--gold);}
  .hero-content .sub{
    margin-top:22px;
    color:var(--cream-dim);
    font-size:16px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
  }
  .hero-content .sub b{color:var(--cream);}

  .hero-cta{
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
    margin-top:36px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    font-weight:700;font-size:14px;letter-spacing:0.02em;text-transform:uppercase;
    padding:14px 26px;border-radius:3px;text-decoration:none;cursor:pointer;
    border:1px solid transparent;transition:transform .12s ease, background .15s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn-primary{background:var(--gold);color:var(--ink);}
  .btn-primary:hover{background:#ffd633;}
  .btn-ghost{border-color:var(--line);color:var(--cream);background:rgba(255,255,255,0.03);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;transition-duration:0.001ms !important;}
  }
</style>
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a href="home.html" class="brand">
      <svg class="brand-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#fff" stroke="#111" stroke-width="6"/>
        <path d="M6,50 A44,44 0 0,1 94,50 Z" fill="#EE1515" stroke="#111" stroke-width="6"/>
        <line x1="6" y1="50" x2="94" y2="50" stroke="#111" stroke-width="7"/>
        <circle cx="50" cy="50" r="15" fill="#fff" stroke="#111" stroke-width="7"/>
        <circle cx="50" cy="50" r="6" fill="#111"/>
      </svg>
      Pokemon VGC Draft League
    </a>
    <div class="nav-links">
      <a href="index.html#format">Format</a>
      <a href="index.html#how">How It Works</a>
      <a href="pool.html">Pool</a>
      <a href="results.html">Results</a>
      <a href="draft.html">Draft Room</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="collage" id="collage"></div>
  <div class="hero-scrim"></div>
  <div class="hero-content">
    <span class="eyebrow">Regulation Set M-B · Doubles · Mega Evolution Era</span>
    <h1>POKEMON VGC<br><span class="accent">DRAFT LEAGUE</span></h1>
    <p class="sub">Draft your roster here — matches are played out for real in <b>Pokémon Champions</b>.</p>
    <div class="hero-cta">
      <a href="draft.html" class="btn btn-primary">Enter the Draft Room</a>
      <a href="pool.html" class="btn btn-ghost">Browse the Pool</a>
    </div>
  </div>
</section>

<script>
  // Faded background collage built from the league's highest-tier Pokémon.
  const TOP_SLUGS = [
    "charizard-mega-y","floette-mega","gengar-mega","archaludon","basculegion",
    "froslass-mega","gholdengo","mawile-mega","metagross-mega","sneasler",
    "staraptor-mega","swampert-mega","whimsicott","garchomp","gardevoir-mega","incineroar"
  ];

  // Hand-placed positions/sizes so the collage reads as a deliberate scatter,
  // not a random grid — spread toward the edges to keep the center readable.
  const LAYOUT = [
    {top:'4%',  left:'2%',  size:220, rot:-8},
    {top:'58%', left:'0%',  size:260, rot:6},
    {top:'2%',  left:'20%', size:170, rot:5},
    {top:'70%', left:'16%', size:190, rot:-4},
    {top:'8%',  left:'78%', size:230, rot:7},
    {top:'62%', left:'82%', size:250, rot:-6},
    {top:'2%',  left:'58%', size:190, rot:-3},
    {top:'74%', left:'46%', size:180, rot:4},
    {top:'34%', left:'-2%', size:200, rot:3},
    {top:'30%', left:'92%', size:210, rot:-5},
    {top:'50%', left:'34%', size:150, rot:8},
    {top:'46%', left:'64%', size:160, rot:-7},
    {top:'-4%', left:'40%', size:150, rot:2},
    {top:'86%', left:'64%', size:170, rot:-2},
    {top:'20%', left:'40%', size:130, rot:6},
    {top:'88%', left:'2%',  size:160, rot:5}
  ];

  const collage = document.getElementById('collage');

  function candidatesFor(slug){
    return [
      'https://img.pokemondb.net/sprites/scarlet-violet/icon/' + slug + '.png',
      'https://img.pokemondb.net/sprites/home/normal/2x/' + slug + '.jpg'
    ];
  }

  TOP_SLUGS.forEach((slug, i) => {
    const pos = LAYOUT[i % LAYOUT.length];
    const img = document.createElement('img');
    const candidates = candidatesFor(slug);
    let idx = 0;
    img.src = candidates[0];
    img.style.top = pos.top;
    img.style.left = pos.left;
    img.style.width = pos.size + 'px';
    img.style.height = pos.size + 'px';
    img.style.transform = 'rotate(' + pos.rot + 'deg)';
    img.alt = '';
    img.loading = 'lazy';
    img.addEventListener('error', function(){
      idx++;
      if(idx < candidates.length){
        img.src = candidates[idx];
      } else {
        img.style.display = 'none';
      }
    });
    collage.appendChild(img);
  });
</script>

</body>
</html>
